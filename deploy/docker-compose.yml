version: '3.8'

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15
    container_name: stock-strategy-db
    environment:
      POSTGRES_DB: stock_strategy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stock-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: stock-strategy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stock-network

  # 数据采集服务
  data-collector:
    build:
      context: ../data/python
      dockerfile: Dockerfile
    container_name: stock-data-collector
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=stock_strategy
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../data/python:/app
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - stock-network
    restart: unless-stopped

  # 后端API服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stock-strategy-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=stock_strategy
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8080
      - SERVER_MODE=production
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - stock-network
    restart: unless-stopped

  # 前端Web服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: stock-strategy-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - stock-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: stock-strategy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - stock-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  stock-network:
    driver: bridge